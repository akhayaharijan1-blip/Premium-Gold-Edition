<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Birthday Surprise 🎁</title>
  <style>
    body {body {
  margin: 0;
  padding: 0;
  background: radial-gradient(circle, #1a1a2e, #000428);
  color: white;
  font-family: Arial, sans-serif;
  text-align: center;
  overflow: hidden;
}
    .container {
      margin-top: 15%;
    }

    h1 {h1 {
  font-size: 50px;
  color: gold;
  animation: glow 2s infinite alternate;
  text-shadow: 0 0 10px gold, 0 0 20px orange;
}
    p {
      font-size: 20px;
      margin-top: 20px;
    }

    .gift {.gift {
  font-size: 90px;
  cursor: pointer;
  animation: bounce 1.2s infinite, glowGift 2s infinite alternate;
}

    @keyframes glow {
      from { text-shadow: 0 0 10px gold; }
      to { text-shadow: 0 0 30px orange; }
    }

    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-20px); }
    }
  </style>
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
</head>

<body>

  <div class="container">
    <h1>Happy Birthday 🎂</h1>
    <p>A special surprise is waiting for you...</p>

    <div class="gift" onclick="openGift()">🎁</div>
    <p>Click the gift to unlock 🎉</p>
  </div>
<script>
<script>
function openGift() {

  confetti({
    particleCount: 200,
    spread: 120,
    origin: { y: 0.6 }
  });

  document.body.innerHTML = `
    <div style="margin-top:15%; text-align:center; color:white; font-family:Arial;">
      <h1 style="color:gold; font-size:50px;">🎉 Surprise Opened 🎉</h1>
      <p style="font-size:22px;">Aapke liye ek special birthday blessing ❤️</p>
      <div style="font-size:80px;">🎂🎊✨</div>
    </div>
  `;
}
</script>

}
</script>
</body>
</html>
